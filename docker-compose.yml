name: project1

version: "3.8"
services:
  app:
    build: .
    container_name: kelompok5_app
    ports:
      - "8888:80"
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: kelompok5_db
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: kicaw
      MYSQL_PASSWORD: rahasia
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
